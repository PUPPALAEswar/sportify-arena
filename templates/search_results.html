<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Nearby Courts</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1 class="team-heading">
Nearby {{ sport }} Courts in {{ location }}
</h1>

<div class="teams-container">

{% if venues %}

{% for venue in venues %}

<div class="team-card">

<div class="sport-badge">
{{ venue.sport }}
</div>

<h2>
{{ venue.venue_name }}
</h2>

<p>
📍 {{ venue.location }}
</p>

<p>
⏰ {{ venue.available_time }}
</p>

<p>
📞 {{ venue.contact }}
</p>

</div>

{% endfor %}

{% else %}

<h2 style="color:white;">
No nearby courts found
</h2>

{% endif %}

</div>

</body>
</html>
